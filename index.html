<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCG - Arena Counter</title>
    
    <!-- Configuração do seu Ícone Personalizado (POKEMON-ICO) -->
    <link rel="icon" type="image/x-icon" href="POKEMON-ICO.ico">
    <link rel="icon" type="image/png" href="POKEMON-ICO.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="arena-container">
    <header class="arena-header">
        <div class="logo-area">
            <h1>POKÉMON TCG</h1>
            <span class="subtitle">ARENA BATTLE COUNTER</span>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchPlayer(1)">Jogador 1</button>
            <button class="tab-btn" onclick="switchPlayer(2)">Jogador 2</button>
        </div>
    </header>

    <!-- Painel de Invocação (Adicionar) -->
    <div class="form-add">
        <input type="text" id="pokeName" placeholder="Nome do Pokémon (ex: Charizard)" required>
        <input type="number" id="pokeHp" placeholder="HP" value="120" step="10">
        <select id="pokeType">
            <option value="colorless">Incolor</option>
            <option value="grass">Planta</option>
            <option value="fire">Fogo</option>
            <option value="water">Água</option>
            <option value="lightning">Elétrico</option>
            <option value="psychic">Psíquico</option>
            <option value="fighting">Lutador</option>
            <option value="darkness">Escuridão</option>
            <option value="metal">Metal</option>
            <option value="dragon">Dragão</option>
        </select>
        <button onclick="addPokemon()">Invocar Carta</button>
    </div>

    <!-- Campos de Batalha -->
    <div id="player1-list" class="pokemon-list"></div>
    <div id="player2-list" class="pokemon-list hidden"></div>
</div>

<script src="script.js"></script>
</body>
</html>
